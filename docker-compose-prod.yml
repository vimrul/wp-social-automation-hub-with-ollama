version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: wp-social-automation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wp_social_automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - /home/ubuntu/wp-ollma-automation/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wp_social_automation"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - wp_social_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wp-social-automation-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/entrypoint.prod.sh"]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || curl -fsS http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - wp_social_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: wp-social-automation-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8021:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - wp_social_internal

networks:
  wp_social_internal:
    name: wp_social_internal
    driver: bridge
