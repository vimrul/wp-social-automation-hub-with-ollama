version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: wp_social_backend
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - wp_social_net
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: wp_social_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - wp_social_net
    expose:
      - "80"

  nginx:
    image: nginx:stable-alpine
    container_name: wp_social_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "8088:80"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wp_social_net

networks:
  wp_social_net:
    driver: bridge